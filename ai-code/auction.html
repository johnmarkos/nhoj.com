<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Silent Auction Manager</title>
  <meta http-equiv="refresh" content="0; url=auction/">
  <link rel="canonical" href="https://nhoj.com/ai-code/auction/">
  <script>
    window.location.replace('auction/');
  </script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --border: #cbd5e1;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --border: #334155;
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.5 "JetBrains Mono", "SF Mono", "Fira Code", Consolas, monospace;
    }

    main {
      max-width: 42rem;
      padding: 1.25rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    a {
      color: inherit;
    }
  </style>
</head>
<body>
  <main>
    <p>Redirecting to the current Silent Auction Manager. If nothing happens, <a href="auction/">open the app here</a>.</p>
  </main>
</body>
</html>
